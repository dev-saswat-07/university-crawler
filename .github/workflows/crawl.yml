name: Crawl FMU Website

on:
  schedule:
    - cron: '0 2 * * MON'   # Every Monday at 02:00 UTC
  workflow_dispatch:         # Manual trigger via UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # Default token — sufficient since no branch protection

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (Tesseract OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng libtesseract-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run crawler script
        run: python crawler.py

      - name: Commit and push new/changed .txt files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-crawled data from fmuniversity.nic.in (UTC $(date -u '+%Y-%m-%d %H:%M:%S'))"
          branch: main
          file_pattern: 'output/*.txt'
          skip_dirty_check: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up (optional)
        run: rm -f output/*.tmp  # if your script creates temp files
