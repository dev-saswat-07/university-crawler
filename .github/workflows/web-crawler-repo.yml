name: Web Crawler with Repository Storage

on:
 workflow_dispatch:
 inputs:
 base_url:
 description: 'Base URL to crawl'
 required: true
 default: 'https://fmuniversity.nic.in/index'
 max_depth:
 description: 'Maximum crawl depth'
 required: false
 default: '2'
 type: string
 max_pages:
 description: 'Maximum pages to crawl'
 required: false
 default: '20'
 type: string
 delay:
 description: 'Delay between requests (seconds)'
 required: false
 default: '2.0'
 type: string
 handle_pdfs:
 description: 'Process PDF files'
 required: false
 default: 'true'
 type: boolean
 handle_images:
 description: 'Extract text from images (OCR)'
 required: false
 default: 'true'
 type: boolean
 max_file_size:
 description: 'Maximum file size to process (MB)'
 required: false
 default: '5'
 type: string
 output_format:
 description: 'Output format (csv or json)'
 required: false
 default: 'json'
 type: choice
 options:
 - csv
 - json
 file_naming:
 description: 'File naming strategy'
 required: false
 default: 'safe'
 type: choice
 options:
 - safe
 - slug
 - timestamp
 repo_path:
 description: 'Repository path (default: current)'
 required: false
 default: '.'
 type: string

jobs:
 crawl-and-store:
 runs-on: ubuntu-latest
 
 steps:
 - name: Checkout repository
 uses: actions/checkout@v4
 with:
 token: ${{ secrets.GITHUB_TOKEN }}
 fetch-depth: 0 # Fetch all history for proper commits
 
 - name: Set up Python
 uses: actions/setup-python@v4
 with:
 python-version: '3.10'
 
 - name: Setup dependencies
 run: |
 echo "Setting up system dependencies..."
 sudo apt-get update
 sudo apt-get install -y tesseract-ocr tesseract-ocr-eng libgl1-mesa-glx libglib2.0-0 libsm6 libxext6 libxrender-dev libgomp1
 
 echo "Installing Python dependencies..."
 pip install -r requirements.txt
 pip install pdfplumber Pillow pytesseract==0.3.10 numpy
 
 - name: Verify installations
 run: |
 python -c "import pytesseract; print(f'Tesseract: {pytesseract.get_tesseract_version()}')"
 python -c "import pdfplumber; print('PDF support ready')"
 
 - name: Create crawler script
 run: |
 cat > crawler_repo.py << 'EOF'
 [Paste the entire RepositoryWebCrawler code from above]
 EOF
 
 - name: Generate commit message
 id: commit-message
 run: |
 TIMESTAMP=$(date +%Y-%m-%d_%H-%M-%S)
 BASE_URL=${{ github.event.inputs.base_url }}
 COMMIT_MSG="🌐 Web Crawl: ${BASE_URL} - ${TIMESTAMP}"
 echo "commit_message=$COMMIT_MSG" >> $GITHUB_OUTPUT
 
 - name: Run crawler with repository storage
 env:
 BASE_URL: ${{ github.event.inputs.base_url }}
 MAX_DEPTH: ${{ github.event.inputs.max_depth }}
 MAX_PAGES: ${{ github.event.inputs.max_pages }}
 DELAY: ${{ github.event.inputs.delay }}
 HANDLE_PDFS: ${{ github.event.inputs.handle_pdfs }}
 HANDLE_IMAGES: ${{ github.event.inputs.handle_images }}
 OUTPUT_FORMAT: ${{ github.event.inputs.output_format }}
 FILE_NAMING: ${{ github.event.inputs.file_naming }}
 MAX_FILE_SIZE: ${{ github.event.inputs.max_file_size }}
 REPO_PATH: ${{ github.event.inputs.repo_path }}
 run: |
 echo "Starting crawl of: $BASE_URL"
 python crawler_repo.py "$BASE_URL" "$MAX_DEPTH" "$MAX_PAGES" "$DELAY" "$HANDLE_PDFS" "$HANDLE_IMAGES" "$OUTPUT_FORMAT" "$REPO_PATH" "$FILE_NAMING"
 
 - name: Check for changes
 id: check-changes
 run: |
 # Check if any files were modified
 if [ -n "$(git status --porcelain)" ]; then
 echo "changes_detected=true" >> $GITHUB_OUTPUT
 echo "Files to commit:"
 git status --porcelain
 else
 echo "changes_detected=false" >> $GITHUB_OUTPUT
 echo "No changes detected"
 fi
 
 - name: Commit and push changes
 if: steps.check-changes.outputs.changes_detected == 'true'
 env:
 GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 run: |
 git config --local user.email "action@github.com"
 git config --local user.name "GitHub Action"
 
 # Add all crawled content
 git add crawled_content/ || true
 git add crawled_data.* || true
 git add stats.json || true
 git add file_index.json || true
 
 # Commit with generated message
 git commit -m "${{ steps.commit-message.outputs.commit_message }}"
 
 # Push changes
 git push origin ${{ github.ref }}
 
 - name: Create pull request (optional)
 if: steps.check-changes.outputs.changes_detected == 'true'
 uses: peter-evans/create-pull-request@v4
 with:
 token: ${{ secrets.GITHUB_TOKEN }}
 commit-message: "${{ steps.commit-message.outputs.commit_message }}"
 title: "🌐 Web Crawl Results: ${{ github.event.inputs.base_url }}"
 body: |
 Crawl results from ${{ github.event.inputs.base_url }}:
 
 - **Crawl Date**: $(date)
 - **Base URL**: ${{ github.event.inputs.base_url }}
 - **Max Depth**: ${{ github.event.inputs.max_depth }}
 - **Max Pages**: ${{ github.event.inputs.max_pages }}
 - **Files Created**: $(find crawled_content -type f | wc -l)
 
 📁 **New Files Added**:
 - All extracted content saved in `crawled_content/` directory
 - Individual HTML pages, PDFs, and images with extracted text
 - Metadata files for each extracted file
 
 📊 **Statistics Available**:
 - `stats.json` - Crawl statistics
 - `file_index.json` - Index of all extracted files
 - `crawled_data.json` - Raw crawl data
 
 🔗 **Access Your Content**:
 The extracted content is now permanently stored in your repository! Browse to the `crawled_content/` directory to find:
 - All HTML pages as text files
 - PDF content extracted to text
 - Images processed with OCR
 - Metadata for each file
 
 - name: Upload artifact summary
 uses: actions/upload-artifact@v3
 if: always()
 with:
 name: crawl-summary
 path: |
 stats.json
 file_index.json
 crawled_data.*
 retention-days: 30
 
 - name: Display final summary
 run: |
 echo "=== 🎉 Crawl Complete! ==="
 echo "Your extracted content has been saved to the repository!"
 echo ""
 echo "📂 Repository Structure Created:"
 echo "crawled_content/"
 echo "├── webpages/"
 echo "├── pdfs/"
 echo "├── images/"
 echo "├── README.md"
 echo "├── crawl_statistics.json"
 echo "└── file_index.json"
 echo ""
 echo "🔗 Access your content anytime at:"
 echo "https://github.com/${{ github.repository }}/tree/${{ github.ref }}/crawled_content"
 echo ""
 echo "📊 Total Files Saved: $(find crawled_content -type f 2>/dev/null | wc -l)"
 echo "📄 Stats Available: $(cat stats.json | jq -r '.total_crawled // 0') pages crawled"
