name: Web Crawler with Repository Storage

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL to crawl
        required: true
        default: https://fmuniversity.nic.in/index

jobs:
  crawl-and-store:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr
          pip install requests beautifulsoup4 pdfplumber pillow pytesseract

      - name: Run crawler
        run: |
          python crawler_repo.py "${{ github.event.inputs.base_url }}"

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Crawler results"
          git push
